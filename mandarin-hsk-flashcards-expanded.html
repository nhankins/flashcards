<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK Mastery - Flashcards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0e0d;
            --bg-secondary: #1a1916;
            --bg-card: #252420;
            --text-primary: #f5f5f5;
            --text-secondary: #a8a8a8;
            --accent: #c44536;
            --accent-hover: #e05544;
            --success: #4caf50;
            --warning: #ff9800;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), #ff6b5b);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-bar {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Main Layout */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
            min-height: calc(100vh - 80px);
        }

        /* Left Panel - Card Area */
        .card-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
            min-height: 500px;
        }

        .flashcard {
            width: 100%;
            max-width: 500px;
            height: 400px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
        }

        .card-front {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
        }

        .card-content {
            text-align: center;
            width: 100%;
        }

        .hanzi-container {
            margin-bottom: 1rem;
        }

        .hanzi {
            font-size: 4rem;
            font-weight: 300;
            line-height: 1.2;
            color: var(--text-primary);
        }

        .traditional {
            font-size: 2rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-weight: 300;
        }

        .pinyin {
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
            font-weight: 500;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .pinyin.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        .definition {
            font-size: 1.25rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .definition.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        .sentence-section {
            width: 100%;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
            max-height: 0;
            overflow: hidden;
        }

        .sentence-section.revealed {
            opacity: 1;
            transform: translateY(0);
            max-height: 300px;
        }

        .sentence-chinese {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
            line-height: 1.6;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border-left: 3px solid var(--accent);
        }

        .sentence-pinyin {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            font-style: italic;
        }

        .sentence-english {
            font-size: 1.1rem;
            color: var(--text-primary);
            line-height: 1.5;
            padding: 1rem;
            background: rgba(76, 175, 80, 0.1);
            border-radius: 10px;
            border-left: 3px solid var(--success);
        }

        .reveal-hint {
            position: absolute;
            bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .flashcard:hover .reveal-hint {
            opacity: 1;
        }

        .hint-icon {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* Controls */
        .controls-area {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .grade-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
        }

        .grade-btn {
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .grade-again {
            background: rgba(244, 67, 54, 0.15);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        .grade-hard {
            background: rgba(255, 152, 0, 0.15);
            color: var(--warning);
            border: 1px solid rgba(255, 152, 0, 0.3);
        }

        .grade-good {
            background: rgba(76, 175, 80, 0.15);
            color: var(--success);
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .grade-easy {
            background: rgba(33, 150, 243, 0.15);
            color: #2196f3;
            border: 1px solid rgba(33, 150, 243, 0.3);
        }

        .grade-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }

        .grade-btn:active {
            transform: translateY(0);
        }

        .nav-buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
        }

        .nav-btn {
            padding: 0.75rem 1.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-btn:hover {
            background: var(--bg-card);
            border-color: var(--accent);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Right Panel - Sidebar */
        .sidebar {
            background: var(--bg-secondary);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .filter-controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .search-box {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(196, 69, 54, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .level-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .level-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .level-btn:hover {
            border-color: var(--text-secondary);
        }

        .level-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 0.5rem;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .grid-card {
            aspect-ratio: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .grid-card:hover {
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .grid-card.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .grid-card.learned {
            border-color: var(--success);
        }

        .grid-card.learned::after {
            content: '✓';
            position: absolute;
            top: 2px;
            right: 4px;
            font-size: 0.6rem;
            color: var(--success);
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .action-btn {
            flex: 1;
            padding: 0.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .main-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                max-height: none;
            }

            .card-stage {
                min-height: 400px;
            }

            .flashcard {
                height: 350px;
            }

            .hanzi {
                font-size: 4rem;
            }
        }

        @media (max-width: 600px) {
            .header {
                padding: 1rem;
            }

            .stats-bar {
                gap: 1rem;
            }

            .main-container {
                padding: 1rem;
                gap: 1rem;
            }

            .flashcard {
                height: 320px;
            }

            .hanzi {
                font-size: 3.5rem;
            }

            .grade-buttons {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-in {
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="brand">
            <div class="brand-icon">汉</div>
            <h1>HSK Mastery</h1>
        </div>
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalCards">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="learnedCards">0</div>
                <div class="stat-label">Learned</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="currentLevel">HSK 1</div>
                <div class="stat-label">Level</div>
            </div>
        </div>
    </header>

    <main class="main-container">
        <div class="card-panel">
            <div class="card-stage">
                <div class="flashcard" id="flashcard">
                    <div class="card-face card-front">
                        <div class="card-content">
                            <div class="hanzi-container">
                                <div class="hanzi" id="frontHanzi">汉</div>
                                <div class="traditional" id="frontTraditional">漢</div>
                            </div>
                            <div class="pinyin" id="frontPinyin">hàn</div>
                            <div class="definition" id="frontDefinition">Chinese character</div>
                        </div>
                        <div class="reveal-hint">
                            <span class="hint-icon">👆</span>
                            <span>Tap to Reveal</span>
                        </div>
                    </div>
                    <div class="card-face card-back">
                        <div class="card-content">
                            <div class="sentence-section" id="sentenceSection">
                                <div class="sentence-chinese" id="backSentenceZh"></div>
                                <div class="sentence-pinyin" id="backSentencePy"></div>
                                <div class="sentence-english" id="backSentenceEn"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="controls-area">
                <div class="grade-buttons">
                    <button class="grade-btn grade-again" onclick="gradeCard('again')">Again</button>
                    <button class="grade-btn grade-hard" onclick="gradeCard('hard')">Hard</button>
                    <button class="grade-btn grade-good" onclick="gradeCard('good')">Good</button>
                    <button class="grade-btn grade-easy" onclick="gradeCard('easy')">Easy</button>
                </div>
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevBtn" onclick="previousCard()">← Previous</button>
                    <button class="nav-btn" id="nextBtn" onclick="nextCard()">Next →</button>
                </div>
            </div>
        </div>

        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-title">Card Library</h2>
                <span id="cardCount">0 cards</span>
            </div>

            <div class="filter-controls">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="Search characters..." oninput="filterCards()">
                </div>

                <div class="level-filters" id="levelFilters">
                    <button class="level-btn active" data-level="all">All</button>
                    <button class="level-btn" data-level="1">HSK 1</button>
                    <button class="level-btn" data-level="2">HSK 2</button>
                    <button class="level-btn" data-level="3">HSK 3</button>
                    <button class="level-btn" data-level="4">HSK 4</button>
                    <button class="level-btn" data-level="5">HSK 5</button>
                    <button class="level-btn" data-level="6">HSK 6</button>
                </div>
            </div>

            <div class="card-grid" id="cardGrid"></div>

            <div class="action-buttons">
                <button class="action-btn" onclick="shuffleCards()">🔀 Shuffle</button>
                <button class="action-btn" onclick="resetProgress()">↺ Reset</button>
            </div>
        </aside>
    </main>

    <script>

            { hanzi: '确立', pinyin: 'quèlì', definition: 'to establish; to set', level: 6, sentence: { zh: '确立目标', py: 'quèlì mùbiāo', en: 'set goals' } },
            { hanzi: '确认', pinyin: 'quèrèn', definition: 'to confirm', level: 6, sentence: { zh: '确认信息', py: 'quèrèn xìnxī', en: 'confirm information' } },
            { hanzi: '热忱', pinyin: 'rèchén', definition: 'enthusiasm; zeal', level: 6, sentence: { zh: '工作热忱', py: 'gōngzuò rèchén', en: 'work enthusiasm' } },
            { hanzi: '融合', pinyin: 'rónghé', definition: 'to integrate; fusion', level: 6, sentence: { zh: '文化交流融合', py: 'wénhuà jiāoliú rónghé', en: 'cultural exchange and integration' } },
            { hanzi: '探索', pinyin: 'tànsuǒ', definition: 'to explore; to probe', level: 6, sentence: { zh: '探索未知', py: 'tànsuǒ wèizhī', en: 'explore the unknown' } }
        ];

        // Application State
        let currentCardIndex = 0;
        let filteredCards = [...hskData];
        let learnedCards = new Set();
        let currentLevel = 'all';
        let revealStage = 0; // 0 = initial, 1 = pinyin revealed, 2 = definition revealed, 3 = sentence revealed

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadProgress();
            renderCardGrid();
            updateStats();
            displayCard(0);
            setupEventListeners();
        });

        function setupEventListeners() {
            // Card flip on click/tap
            const flashcard = document.getElementById('flashcard');
            flashcard.addEventListener('click', handleCardClick);
            
            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    handleCardClick();
                } else if (e.key === 'ArrowLeft') {
                    previousCard();
                } else if (e.key === 'ArrowRight') {
                    nextCard();
                } else if (e.key >= '1' && e.key <= '4') {
                    const grades = ['again', 'hard', 'good', 'easy'];
                    gradeCard(grades[parseInt(e.key) - 1]);
                }
            });

            // Level filters
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentLevel = btn.dataset.level;
                    filterCards();
                });
            });
        }

        function handleCardClick() {
            const flashcard = document.getElementById('flashcard');
            
            if (revealStage === 0) {
                // First click: reveal pinyin
                document.getElementById('frontPinyin').classList.add('revealed');
                revealStage = 1;
            } else if (revealStage === 1) {
                // Second click: reveal definition
                document.getElementById('frontDefinition').classList.add('revealed');
                revealStage = 2;
            } else if (revealStage === 2) {
                // Third click: flip to show sentence
                flashcard.classList.add('flipped');
                setTimeout(() => {
                    document.getElementById('sentenceSection').classList.add('revealed');
                }, 300);
                revealStage = 3;
            } else if (revealStage === 3) {
                // Fourth click: reset card
                resetCardState();
            }
        }

        function resetCardState() {
            const flashcard = document.getElementById('flashcard');
            flashcard.classList.remove('flipped');
            
            setTimeout(() => {
                document.getElementById('frontPinyin').classList.remove('revealed');
                document.getElementById('frontDefinition').classList.remove('revealed');
                document.getElementById('sentenceSection').classList.remove('revealed');
                revealStage = 0;
            }, 300);
        }

        function displayCard(index) {
            if (filteredCards.length === 0) return;
            
            const card = filteredCards[index];
            const flashcard = document.getElementById('flashcard');
            
            // Reset card state completely
            resetCardState();
            
            // Small delay to allow flip reset before content change
            setTimeout(() => {
                document.getElementById('frontHanzi').textContent = card.hanzi;
                
                // Add traditional character if different from simplified
                const traditionalEl = document.getElementById('frontTraditional');
                const traditionalChar = getTraditionalChar(card.hanzi);
                if (traditionalChar && traditionalChar !== card.hanzi) {
                    traditionalEl.textContent = traditionalChar;
                    traditionalEl.style.display = 'block';
                } else {
                    traditionalEl.style.display = 'none';
                }
                
                document.getElementById('frontPinyin').textContent = card.pinyin;
                document.getElementById('frontDefinition').textContent = card.definition;
                
                document.getElementById('backSentenceZh').textContent = card.sentence.zh;
                document.getElementById('backSentencePy').textContent = card.sentence.py;
                document.getElementById('backSentenceEn').textContent = card.sentence.en;
                
                // Update grid highlighting
                updateGridHighlight(index);
                
                // Update nav buttons
                document.getElementById('prevBtn').disabled = index === 0;
                document.getElementById('nextBtn').disabled = index === filteredCards.length - 1;
                
                currentCardIndex = index;
            }, 150);
        }

        function nextCard() {
            if (currentCardIndex < filteredCards.length - 1) {
                displayCard(currentCardIndex + 1);
            }
        }

        function previousCard() {
            if (currentCardIndex > 0) {
                displayCard(currentCardIndex - 1);
            }
        }

        function gradeCard(grade) {
            const card = filteredCards[currentCardIndex];
            
            if (grade === 'easy' || grade === 'good') {
                learnedCards.add(card.hanzi);
                saveProgress();
                renderCardGrid();
                updateStats();
            }
            
            // Visual feedback
            const flashcard = document.getElementById('flashcard');
            flashcard.style.transform = 'scale(0.95)';
            setTimeout(() => {
                flashcard.style.transform = '';
                if (currentCardIndex < filteredCards.length - 1) {
                    nextCard();
                }
            }, 200);
        }

        function filterCards() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            filteredCards = hskData.filter(card => {
                const matchesLevel = currentLevel === 'all' || card.level.toString() === currentLevel;
                const matchesSearch = !searchTerm || 
                    card.hanzi.includes(searchTerm) ||
                    card.pinyin.toLowerCase().includes(searchTerm) ||
                    card.definition.toLowerCase().includes(searchTerm);
                return matchesLevel && matchesSearch;
            });
            
            renderCardGrid();
            
            if (filteredCards.length > 0) {
                displayCard(0);
            }
            
            document.getElementById('cardCount').textContent = `${filteredCards.length} cards`;
        }

        function renderCardGrid() {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = '';
            
            filteredCards.forEach((card, index) => {
                const gridCard = document.createElement('div');
                gridCard.className = 'grid-card';
                gridCard.textContent = card.hanzi;
                
                if (learnedCards.has(card.hanzi)) {
                    gridCard.classList.add('learned');
                }
                
                if (index === currentCardIndex) {
                    gridCard.classList.add('active');
                }
                
                gridCard.addEventListener('click', () => {
                    displayCard(index);
                });
                
                grid.appendChild(gridCard);
            });
        }

        function updateGridHighlight(index) {
            const gridCards = document.querySelectorAll('.grid-card');
            gridCards.forEach((card, i) => {
                card.classList.toggle('active', i === index);
            });
        }

        function updateStats() {
            document.getElementById('totalCards').textContent = hskData.length;
            document.getElementById('learnedCards').textContent = learnedCards.size;
            
            const levelCounts = {};
            learnedCards.forEach(hanzi => {
                const card = hskData.find(c => c.hanzi === hanzi);
                if (card) {
                    levelCounts[card.level] = (levelCounts[card.level] || 0) + 1;
                }
            });
            
            const maxLevel = Math.max(...Object.keys(levelCounts).map(Number), 0);
            document.getElementById('currentLevel').textContent = maxLevel > 0 ? `HSK ${maxLevel}` : 'HSK 1';
        }

        function shuffleCards() {
            for (let i = filteredCards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [filteredCards[i], filteredCards[j]] = [filteredCards[j], filteredCards[i]];
            }
            renderCardGrid();
            displayCard(0);
        }

        function resetProgress() {
            if (confirm('Are you sure you want to reset all progress?')) {
                learnedCards.clear();
                saveProgress();
                renderCardGrid();
                updateStats();
            }
        }

        function saveProgress() {
            localStorage.setItem('hskLearnedCards', JSON.stringify([...learnedCards]));
        }

        function loadProgress() {
            const saved = localStorage.getItem('hskLearnedCards');
            if (saved) {
                learnedCards = new Set(JSON.parse(saved));
            }
        }

        // Simplified to Traditional character mapping for common HSK characters
        function getTraditionalChar(simplified) {
            const tradMap = {
                '的': '的', '一': '一', '是': '是', '不': '不', '了': '了',
                '人': '人', '在': '在', '我': '我', '有': '有', '他': '他',
                '这': '這', '中': '中', '来': '來', '上': '上', '大': '大',
                '国': '國', '个': '個', '到': '到', '说': '說', '们': '們',
                '去': '去', '要': '要', '没': '沒', '为': '為', '就': '就',
                '学': '學', '会': '會', '对': '對', '能': '能', '发': '發',
                '下': '下', '过': '過', '起': '起', '都': '都', '和': '和',
                '那': '那', '也': '也', '着': '著', '以': '以', '而': '而',
                '后': '後', '里': '裡', '用': '用', '道': '道', '行': '行',
                '所': '所', '然': '然', '家': '家', '种': '種', '事': '事',
                '成': '成', '方': '方', '多': '多', '经': '經', '么': '麼',
                '之': '之', '法': '法', '如': '如', '其': '其', '想': '想',
                '作': '作', '好': '好', '看': '看', '自': '自', '己': '己',
                '手': '手', '生': '生', '心': '心', '头': '頭', '身': '身',
                '本': '本', '前': '前', '力': '力', '原': '原', '因': '因',
                '最': '最', '长': '長', '从': '從', '知': '知', '理': '理',
                '气': '氣', '当': '當', '两': '兩', '些': '些', '还': '還',
                '时': '時', '体': '體', '高': '高', '电': '電', '场': '場',
                '进': '進', '出': '出', '小': '小', '口': '口', '山': '山',
                '水': '水', '火': '火', '木': '木', '金': '金', '土': '土'
            };
            return tradMap[simplified] || null;
        }
    </script>
