<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farsi Mastery - Flashcards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0e0d;
            --bg-secondary: #1a1916;
            --bg-card: #252420;
            --text-primary: #f5f5f5;
            --text-secondary: #a8a8a8;
            --accent: #2e7d32;
            --accent-hover: #4caf50;
            --success: #4caf50;
            --warning: #ff9800;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Vazirmatn', 'Tahoma', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            direction: rtl;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), #66bb6a);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-bar {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Main Layout */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
            min-height: calc(100vh - 80px);
        }

        /* Left Panel - Card Area */
        .card-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
            min-height: 500px;
        }

        .flashcard {
            width: 100%;
            max-width: 500px;
            height: 400px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
        }

        .card-front {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
        }

        .card-content {
            text-align: center;
            width: 100%;
        }

        .farsi-container {
            margin-bottom: 1rem;
        }

        .farsi-word {
            font-size: 3.5rem;
            font-weight: 300;
            line-height: 1.6;
            color: var(--text-primary);
            font-family: 'Vazirmatn', 'Tahoma', sans-serif;
        }

        .pronunciation {
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
            font-weight: 500;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            direction: ltr;
        }

        .pronunciation.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        .definition {
            font-size: 1.25rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .definition.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        .sentence-section {
            width: 100%;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
            max-height: 0;
            overflow: hidden;
        }

        .sentence-section.revealed {
            opacity: 1;
            transform: translateY(0);
            max-height: 300px;
        }

        .sentence-farsi {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
            line-height: 1.8;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border-right: 3px solid var(--accent);
            font-family: 'Vazirmatn', 'Tahoma', sans-serif;
        }

        .sentence-pronunciation {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            font-style: italic;
            direction: ltr;
        }

        .sentence-english {
            font-size: 1.1rem;
            color: var(--text-primary);
            line-height: 1.5;
            padding: 1rem;
            background: rgba(76, 175, 80, 0.1);
            border-radius: 10px;
            border-right: 3px solid var(--success);
            direction: ltr;
        }

        .reveal-hint {
            position: absolute;
            bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .flashcard:hover .reveal-hint {
            opacity: 1;
        }

        .hint-icon {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* Controls */
        .controls-area {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .grade-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
        }

        .grade-btn {
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .grade-again {
            background: rgba(244, 67, 54, 0.15);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        .grade-hard {
            background: rgba(255, 152, 0, 0.15);
            color: var(--warning);
            border: 1px solid rgba(255, 152, 0, 0.3);
        }

        .grade-good {
            background: rgba(76, 175, 80, 0.15);
            color: var(--success);
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .grade-easy {
            background: rgba(33, 150, 243, 0.15);
            color: #2196f3;
            border: 1px solid rgba(33, 150, 243, 0.3);
        }

        .grade-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }

        .grade-btn:active {
            transform: translateY(0);
        }

        .nav-buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
        }

        .nav-btn {
            padding: 0.75rem 1.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-btn:hover {
            background: var(--bg-card);
            border-color: var(--accent);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Right Panel - Sidebar */
        .sidebar {
            background: var(--bg-secondary);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .filter-controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .search-box {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 2.5rem 0.75rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.2s;
            text-align: right;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
        }

        .search-icon {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .level-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .level-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .level-btn:hover {
            border-color: var(--text-secondary);
        }

        .level-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 0.5rem;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .grid-card {
            aspect-ratio: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            font-family: 'Vazirmatn', 'Tahoma', sans-serif;
        }

        .grid-card:hover {
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .grid-card.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .grid-card.learned {
            border-color: var(--success);
        }

        .grid-card.learned::after {
            content: '✓';
            position: absolute;
            top: 2px;
            right: 4px;
            font-size: 0.6rem;
            color: var(--success);
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .action-btn {
            flex: 1;
            padding: 0.75rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .main-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                max-height: none;
            }

            .card-stage {
                min-height: 400px;
            }

            .flashcard {
                height: 350px;
            }

            .farsi-word {
                font-size: 3rem;
            }
        }

        @media (max-width: 600px) {
            .header {
                padding: 1rem;
            }

            .stats-bar {
                gap: 1rem;
            }

            .main-container {
                padding: 1rem;
                gap: 1rem;
            }

            .flashcard {
                height: 320px;
            }

            .farsi-word {
                font-size: 2.5rem;
            }

            .grade-buttons {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-in {
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
</head>
<body>
    <header class="header">
        <div class="brand">
            <div class="brand-icon">ف</div>
            <h1>Farsi Mastery</h1>
        </div>
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalCards">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="learnedCards">0</div>
                <div class="stat-label">Learned</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="currentLevel">Level 1</div>
                <div class="stat-label">Level</div>
            </div>
        </div>
    </header>

    <main class="main-container">
        <div class="card-panel">
            <div class="card-stage">
                <div class="flashcard" id="flashcard">
                    <div class="card-face card-front">
                        <div class="card-content">
                            <div class="farsi-container">
                                <div class="farsi-word" id="frontFarsi">سلام</div>
                            </div>
                            <div class="pronunciation" id="frontPronunciation">salām</div>
                            <div class="definition" id="frontDefinition">hello</div>
                        </div>
                        <div class="reveal-hint">
                            <span class="hint-icon">👆</span>
                            <span>Tap to Reveal</span>
                        </div>
                    </div>
                    <div class="card-face card-back">
                        <div class="card-content">
                            <div class="sentence-section" id="sentenceSection">
                                <div class="sentence-farsi" id="backSentenceFa"></div>
                                <div class="sentence-pronunciation" id="backSentencePr"></div>
                                <div class="sentence-english" id="backSentenceEn"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="controls-area">
                <div class="grade-buttons">
                    <button class="grade-btn grade-again" onclick="gradeCard('again')">Again</button>
                    <button class="grade-btn grade-hard" onclick="gradeCard('hard')">Hard</button>
                    <button class="grade-btn grade-good" onclick="gradeCard('good')">Good</button>
                    <button class="grade-btn grade-easy" onclick="gradeCard('easy')">Easy</button>
                </div>
                <div class="nav-buttons">
                    <button class="nav-btn" id="prevBtn" onclick="previousCard()">Previous ←</button>
                    <button class="nav-btn" id="nextBtn" onclick="nextCard()">Next →</button>
                </div>
            </div>
        </div>

        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-title">Card Library</h2>
                <span id="cardCount">0 cards</span>
            </div>

            <div class="filter-controls">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="Search words..." oninput="filterCards()">
                </div>

                <div class="level-filters" id="levelFilters">
                    <button class="level-btn active" data-level="all">All</button>
                    <button class="level-btn" data-level="1">Level 1</button>
                    <button class="level-btn" data-level="2">Level 2</button>
                    <button class="level-btn" data-level="3">Level 3</button>
                    <button class="level-btn" data-level="4">Level 4</button>
                    <button class="level-btn" data-level="5">Level 5</button>
                </div>
            </div>

            <div class="card-grid" id="cardGrid"></div>

            <div class="action-buttons">
                <button class="action-btn" onclick="shuffleCards()">🔀 Shuffle</button>
                <button class="action-btn" onclick="resetProgress()">↺ Reset</button>
            </div>
        </aside>
    </main>

    <script>
        // Farsi Vocabulary Data
        const farsiData = [
            { farsi: 'سلام', pronunciation: 'salām', definition: 'hello', level: 1, sentence: { fa: 'سلام، حالت چطور است؟', pr: 'Salām, hālet chetor ast?', en: 'Hello, how are you?' } },
            { farsi: 'خداحافظ', pronunciation: 'khodāhāfez', definition: 'goodbye', level: 1, sentence: { fa: 'خداحافظ، فردا می‌بینمت', pr: 'Khodāhāfez, fardā mibinamet', en: 'Goodbye, see you tomorrow' } },
            { farsi: 'بله', pronunciation: 'bale', definition: 'yes', level: 1, sentence: { fa: 'بله، من موافقم', pr: 'Bale, man movāfegham', en: 'Yes, I agree' } },
            { farsi: 'نه', pronunciation: 'na', definition: 'no', level: 1, sentence: { fa: 'نه، ممنون', pr: 'Na, mamnun', en: 'No, thank you' } },
            { farsi: 'ممنون', pronunciation: 'mamnun', definition: 'thank you', level: 1, sentence: { fa: 'ممنون از کمک شما', pr: 'Mamnun az komake shomā', en: 'Thank you for your help' } },
            { farsi: 'لطفاً', pronunciation: 'lotfan', definition: 'please', level: 1, sentence: { fa: 'لطفاً آب بدهید', pr: 'Lotfan āb bedahid', en: 'Please give me water' } },
            { farsi: 'من', pronunciation: 'man', definition: 'I, me', level: 1, sentence: { fa: 'من دانشجو هستم', pr: 'Man dāneshjo hastam', en: 'I am a student' } },
            { farsi: 'تو', pronunciation: 'to', definition: 'you (informal)', level: 1, sentence: { fa: 'تو کجا هستی؟', pr: 'To kojā hasti?', en: 'Where are you?' } },
            { farsi: 'او', pronunciation: 'u', definition: 'he, she', level: 1, sentence: { fa: 'او معلم است', pr: 'U moallem ast', en: 'He/She is a teacher' } },
            { farsi: 'ما', pronunciation: 'mā', definition: 'we, us', level: 1, sentence: { fa: 'ما به مدرسه می‌رویم', pr: 'Mā be madrese miravim', en: 'We go to school' } },
            { farsi: 'آنها', pronunciation: 'ānhā', definition: 'they, them', level: 1, sentence: { fa: 'آنها در پارک هستند', pr: 'Ānhā dar pārk hastand', en: 'They are in the park' } },
            { farsi: 'این', pronunciation: 'in', definition: 'this', level: 1, sentence: { fa: 'این کتاب من است', pr: 'In ketābe man ast', en: 'This is my book' } },
            { farsi: 'آن', pronunciation: 'ān', definition: 'that', level: 1, sentence: { fa: 'آن ماشین قرمز است', pr: 'Ān māshin ghermez ast', en: 'That car is red' } },
            { farsi: 'چه', pronunciation: 'che', definition: 'what', level: 1, sentence: { fa: 'چه خبر؟', pr: 'Che khabar?', en: 'What\'s news?' } },
            { farsi: 'کجا', pronunciation: 'kojā', definition: 'where', level: 1, sentence: { fa: 'کجا زندگی می‌کنی؟', pr: 'Kojā zendegi mikoni?', en: 'Where do you live?' } },
            { farsi: 'کی', pronunciation: 'key', definition: 'when', level: 1, sentence: { fa: 'کی می‌آیی؟', pr: 'Key miāyi?', en: 'When are you coming?' } },
            { farsi: 'چرا', pronunciation: 'cherā', definition: 'why', level: 1, sentence: { fa: 'چرا دیر کردی؟', pr: 'Cherā dir kardi?', en: 'Why are you late?' } },
            { farsi: 'چطور', pronunciation: 'chetor', definition: 'how', level: 1, sentence: { fa: 'چطور می‌توانم کمک کنم؟', pr: 'Chetor mitavanam komak konam?', en: 'How can I help?' } },
            { farsi: 'چند', pronunciation: 'chand', definition: 'how many/much', level: 1, sentence: { fa: 'چند سال داری؟', pr: 'Chand sāl dāri?', en: 'How old are you?' } },
            { farsi: 'کدام', pronunciation: 'kodām', definition: 'which', level: 1, sentence: { fa: 'کدام را دوست داری؟', pr: 'Kodām rā dust dāri?', en: 'Which one do you like?' } },
            { farsi: 'بودن', pronunciation: 'budan', definition: 'to be', level: 2, sentence: { fa: 'می‌خواهم خوشحال باشم', pr: 'Mikhāham khoshhāl bāsham', en: 'I want to be happy' } },
            { farsi: 'داشتن', pronunciation: 'dāshtan', definition: 'to have', level: 2, sentence: { fa: 'من یک خواهر دارم', pr: 'Man yek khāhar dāram', en: 'I have a sister' } },

        // Application State
        let currentCardIndex = 0;
        let filteredCards = [...farsiData];
        let learnedCards = new Set();
        let currentLevel = 'all';
        let revealStage = 0; // 0 = initial, 1 = pronunciation revealed, 2 = definition revealed, 3 = sentence revealed

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadProgress();
            renderCardGrid();
            updateStats();
            displayCard(0);
            setupEventListeners();
        });

        function setupEventListeners() {
            // Card flip on click/tap
            const flashcard = document.getElementById('flashcard');
            flashcard.addEventListener('click', handleCardClick);

            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    handleCardClick();
                } else if (e.key === 'ArrowLeft') {
                    nextCard();
                } else if (e.key === 'ArrowRight') {
                    previousCard();
                } else if (e.key >= '1' && e.key <= '4') {
                    const grades = ['again', 'hard', 'good', 'easy'];
                    gradeCard(grades[parseInt(e.key) - 1]);
                }
            });

            // Level filters
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentLevel = btn.dataset.level;
                    filterCards();
                });
            });
        }

        function handleCardClick() {
            const flashcard = document.getElementById('flashcard');

            if (revealStage === 0) {
                // First click: reveal pronunciation
                document.getElementById('frontPronunciation').classList.add('revealed');
                revealStage = 1;
            } else if (revealStage === 1) {
                // Second click: reveal definition
                document.getElementById('frontDefinition').classList.add('revealed');
                revealStage = 2;
            } else if (revealStage === 2) {
                // Third click: flip to show sentence
                flashcard.classList.add('flipped');
                setTimeout(() => {
                    document.getElementById('sentenceSection').classList.add('revealed');
                }, 300);
                revealStage = 3;
            } else if (revealStage === 3) {
                // Fourth click: reset card
                resetCardState();
            }
        }

        function resetCardState() {
            const flashcard = document.getElementById('flashcard');
            flashcard.classList.remove('flipped');

            setTimeout(() => {
                document.getElementById('frontPronunciation').classList.remove('revealed');
                document.getElementById('frontDefinition').classList.remove('revealed');
                document.getElementById('sentenceSection').classList.remove('revealed');
                revealStage = 0;
            }, 300);
        }

        function displayCard(index) {
            if (filteredCards.length === 0) return;

            const card = filteredCards[index];
            const flashcard = document.getElementById('flashcard');

            // Reset card state completely
            resetCardState();

            // Small delay to allow flip reset before content change
            setTimeout(() => {
                document.getElementById('frontFarsi').textContent = card.farsi;
                document.getElementById('frontPronunciation').textContent = card.pronunciation;
                document.getElementById('frontDefinition').textContent = card.definition;

                document.getElementById('backSentenceFa').textContent = card.sentence.fa;
                document.getElementById('backSentencePr').textContent = card.sentence.pr;
                document.getElementById('backSentenceEn').textContent = card.sentence.en;

                // Update grid highlighting
                updateGridHighlight(index);

                // Update nav buttons
                document.getElementById('prevBtn').disabled = index === 0;
                document.getElementById('nextBtn').disabled = index === filteredCards.length - 1;

                currentCardIndex = index;
            }, 150);
        }

        function nextCard() {
            if (currentCardIndex < filteredCards.length - 1) {
                displayCard(currentCardIndex + 1);
            }
        }

        function previousCard() {
            if (currentCardIndex > 0) {
                displayCard(currentCardIndex - 1);
            }
        }

        function gradeCard(grade) {
            const card = filteredCards[currentCardIndex];

            if (grade === 'easy' || grade === 'good') {
                learnedCards.add(card.farsi);
                saveProgress();
                renderCardGrid();
                updateStats();
            }

            // Visual feedback
            const flashcard = document.getElementById('flashcard');
            flashcard.style.transform = 'scale(0.95)';
            setTimeout(() => {
                flashcard.style.transform = '';
                if (currentCardIndex < filteredCards.length - 1) {
                    nextCard();
                }
            }, 200);
        }

        function filterCards() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            filteredCards = farsiData.filter(card => {
                const matchesLevel = currentLevel === 'all' || card.level.toString() === currentLevel;
                const matchesSearch = !searchTerm ||
                    card.farsi.includes(searchTerm) ||
                    card.pronunciation.toLowerCase().includes(searchTerm) ||
                    card.definition.toLowerCase().includes(searchTerm);
                return matchesLevel && matchesSearch;
            });

            renderCardGrid();

            if (filteredCards.length > 0) {
                displayCard(0);
            }

            document.getElementById('cardCount').textContent = `${filteredCards.length} cards`;
        }

        function renderCardGrid() {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = '';

            filteredCards.forEach((card, index) => {
                const gridCard = document.createElement('div');
                gridCard.className = 'grid-card';
                gridCard.textContent = card.farsi;

                if (learnedCards.has(card.farsi)) {
                    gridCard.classList.add('learned');
                }

                if (index === currentCardIndex) {
                    gridCard.classList.add('active');
                }

                gridCard.addEventListener('click', () => {
                    displayCard(index);
                });

                grid.appendChild(gridCard);
            });
        }

        function updateGridHighlight(index) {
            const gridCards = document.querySelectorAll('.grid-card');
            gridCards.forEach((card, i) => {
                card.classList.toggle('active', i === index);
            });
        }

        function updateStats() {
            document.getElementById('totalCards').textContent = farsiData.length;
            document.getElementById('learnedCards').textContent = learnedCards.size;

            const levelCounts = {};
            learnedCards.forEach(farsi => {
                const card = farsiData.find(c => c.farsi === farsi);
                if (card) {
                    levelCounts[card.level] = (levelCounts[card.level] || 0) + 1;
                }
            });

            const maxLevel = Math.max(...Object.keys(levelCounts).map(Number), 0);
            document.getElementById('currentLevel').textContent = maxLevel > 0 ? `Level ${maxLevel}` : 'Level 1';
        }

        function shuffleCards() {
            for (let i = filteredCards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [filteredCards[i], filteredCards[j]] = [filteredCards[j], filteredCards[i]];
            }
            renderCardGrid();
            displayCard(0);
        }

        function resetProgress() {
            if (confirm('Are you sure you want to reset all progress?')) {
                learnedCards.clear();
                saveProgress();
                renderCardGrid();
                updateStats();
            }
        }

        function saveProgress() {
            localStorage.setItem('farsiLearnedCards', JSON.stringify([...learnedCards]));
        }

        function loadProgress() {
            const saved = localStorage.getItem('farsiLearnedCards');
            if (saved) {
                learnedCards = new Set(JSON.parse(saved));
            }
        }
    </script>
</body>
</html>
